<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生画面表示モニタ</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="./assets/js/config.js" defer></script>
    <script src="./assets/js/script.js" defer></script>
</head>

<body>
    <header class="app-header">
        <div class="header-content">
            <h1>学生画面表示モニタ</h1>
            <div class="controls">
                <select id="prefix-filter">
                    <option value="">すべての対象を表示</option>
                </select>
                <button id="toggle-update" class="toggle-btn active">自動更新ON</button>
            </div>
        </div>
    </header>

    <main class="app-body">
        <div id="students-grid" class="students-grid">
            <!-- Students will be dynamically injected here -->
        </div>
    </main>

    <div id="image-modal" class="modal-overlay">
        <div class="modal-img-container">
            <button id="modal-close" class="modal-close">&times;</button>
            <img id="modal-img" class="modal-img" src="" alt="拡大画像">
        </div>
    </div>

</body>

</html>
